# pseudo_models.yaml — Proxy pseudo-model configuration
#
# context_window e input_token_threshold de cada pseudo-modelo reflejan
# el mínimo de los context_window de sus physical models, con excepcion
# del modelo "compactador" que puede procesar hasta 3M tokens dividiendo
# en pedazos segun el modelo disponible.

pseudo_models:
  # ── Razonamiento premium ──────────────────────────────────────────────────
  pensamiento-profundo-caro:
    display_name: Pensamiento Profundo
    description: "Razonamiento de máximo nivel. Límite 1M tokens — si lo superas usa /compact para continuar."
    input_token_threshold: 1000000
    context_window: 1000000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: anthropic/qwen3.7-max
        api_base: https://opencode.ai/zen/go
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
        thinking: true
        note: "Go: Qwen3.7 Max vía Anthropic /messages. Premium reasoning (~4.770 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-pro
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
        reasoning_effort: true
        strip_reasoning: true
        note: "Fallback: DeepSeek V4 Pro directo. Razonamiento profundo."
    fallback_strategy: sequential

  # ── Desarrollo sostenido ──────────────────────────────────────────────────
  tareas-avanzadas:
    display_name: Tareas Avanzadas
    description: "Desarrollo profundo y sostenido. MiniMax M2.7 vía Go."
    input_token_threshold: 196608
    context_window: 196608
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: anthropic/minimax-m2.7
        api_base: https://opencode.ai/zen/go
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 196608
        thinking: true
        note: "Go: MiniMax M2.7 (192K contexto) vía Anthropic /messages (~17.000 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
        reasoning_effort: true
        strip_reasoning: true
        note: "Fallback: DeepSeek V4 Flash. Rápido, 1M contexto."
    fallback_strategy: sequential

  # ── Normal (punto de entrada) ─────────────────────────────────────────────
  normal:
    display_name: Normal
    description: "Punto de entrada recomendado. MiMo-V2.5 vía Go. Coding extenso."
    input_token_threshold: 1000000
    context_window: 1000000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: openai/mimo-v2.5
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 1000000
        thinking: true
        reasoning_effort: true
        note: "Go: MiMo-V2.5 vía OpenAI /chat/completions (~150.400 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Fallback: DeepSeek V4 Flash. Rápido, 1M contexto."
    fallback_strategy: sequential

  # ── Visión ────────────────────────────────────────────────────────────────
  vision:
    display_name: Visión
    description: "Visión unificada: OCR, diagramas, UI, screenshots. Límite 131K tokens — usa /compact si superas."
    input_token_threshold: 131072
    context_window: 131072
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: groq
        model: groq/meta-llama/llama-4-scout-17b-16e-instruct
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: true
        context_window: 131072
        system_prompt: |
          IMPORTANT:
          - NEVER describe tool usage in text
          - ONLY use structured tool calls
          - DO NOT simulate tool outputs
          - DO NOT explain intended tool usage
          - IF a tool is available, call it directly

          If you need filesystem information, ALWAYS call tools.
          Never answer from assumptions.
        note: "Primary: Visión vía Groq. 131K contexto. Rápido y barato."
      - provider: opencode-go
        model: openai/mimo-v2-omni
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: true
        context_window: 262144
        thinking: true
        reasoning_effort: true
        note: "Fallback: MiMo V2 Omni (256K contexto). Visión nativa + texto."
    fallback_strategy: sequential

  # ── Gratuito (sin Go) ─────────────────────────────────────────────────────
  normal-gratis:
    display_name: Normal Gratis
    description: "Modelos gratuitos y de bajo costo. Límite 131K tokens — usa /compact si lo superas."
    input_token_threshold: 131072
    context_window: 131072
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: openrouter
        model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        note: "Gratuito vía OpenRouter. 1M contexto. Primary."
        context_window: 1000000
      - provider: groq
        model: groq/qwen/qwen3-32b
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        system_prompt: |
          IMPORTANT:
          - NEVER describe tool usage in text
          - ONLY use structured tool calls
          - DO NOT simulate tool outputs
          - DO NOT explain intended tool usage
          - IF a tool is available, call it directly

          If you need filesystem information, ALWAYS call tools.
          Never answer from assumptions.
        note: "Fallback rápido vía Groq. 32B, 131K contexto. Bajo costo."
        context_window: 131072
    fallback_strategy: sequential

  # ── Flash ────────────────────────────────────────────────────────────────
  flash:
    display_name: Flash
    description: "Sub-agentes rápidos. Clasificación, extracción, parsing. GPT-OSS 20B (Groq) + fallback Go Flash."
    input_token_threshold: 128000
    context_window: 128000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: groq
        model: groq/openai/gpt-oss-20b
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        context_window: 128000
        temperature: 0.1
        top_p: 0.9
        system_prompt: |
          IMPORTANT:
          - NEVER describe tool usage in text
          - ONLY use structured tool calls
          - DO NOT simulate tool outputs
          - DO NOT explain intended tool usage
          - IF a tool is available, call it directly

          If you need filesystem information, ALWAYS call tools.
          Never answer from assumptions.
        note: "Primary: GPT-OSS 20B vía Groq (1000 t/s). Sin tools paralelas."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 1000000
        reasoning_effort: true
        strip_reasoning: true
        note: "Fallback: DeepSeek V4 Flash directo. Rápido, 1M contexto."
    fallback_strategy: sequential

  # ── Compactador (con helpers internos) ────────────────────────────────────
  compactador:
    display_name: Compactador
    description: "Compactación de contexto con delegación de modelos. Puede procesar hasta 3M tokens dividiendo en pedazos según el modelo disponible."
    input_token_threshold: 3000000
    context_window: 3000000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: openai/glm-5.1
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 198000
        thinking: true
        reasoning_effort: true
        note: "Go primary: GLM-5.1 (198K contexto). Compactación vía Go (~4.300 req/mes)."
      - provider: groq
        model: groq/openai/gpt-oss-20b
        context_window: 131072
        openai_tools_compatible: true
        parallel_tools: true
        vision: false
        system_prompt: |
          IMPORTANT:
          - NEVER describe tool usage in text
          - ONLY use structured tool calls
          - DO NOT simulate tool outputs
          - DO NOT explain intended tool usage
          - IF a tool is available, call it directly

          If you need filesystem information, ALWAYS call tools.
          Never answer from assumptions.
        note: "Fallback 1: 20B vía Groq (1000+ t/s). Texto puro para <131K."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        context_window: 1000000
        openai_tools_compatible: true
        reasoning_effort: true
        strip_reasoning: true
        vision: false
        note: "Fallback 2: 1M contexto. Para historias grandes (>131K tokens)."
      # Modelos helper (no participan en fallback de chat)
      - provider: groq
        model: groq/whisper-large-v3
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        audio: true
        context_window: 131072
        note: "Whisper Large V3 — transcripción de audio (helper interno)."
      - provider: groq
        model: groq/whisper-large-v3-turbo
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        audio: true
        context_window: 131072
        note: "Whisper Large V3 Turbo — transcripción de audio rápida (helper interno)."
    fallback_strategy: by_context_window

model_aliases:
  gpt-4o: normal
  gpt-4o-mini: normal
  gpt-4.1: tareas-avanzadas
  o3: pensamiento-profundo-caro
  o4-mini: normal
  gemini-2.5-flash: vision
  gemini-2.5-pro: tareas-avanzadas
  claude-sonnet-4-20250514: tareas-avanzadas
  claude-haiku-3-5-20241022: flash
  default: flash
