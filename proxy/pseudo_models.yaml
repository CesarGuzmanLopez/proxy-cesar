# pseudo_models.yaml — Proxy pseudo-model configuration v1.3
#
# Correcciones aplicadas desde v1.2:
# - thinking solo en Anthropic, reasoning_effort solo en OpenAI
# - Ventanas de contexto corregidas (min(physical) - 1K)
# - vision/pdf/documents separados como capacidades independientes
# - strip_reasoning donde aplica
# - System prompts optimizados para Groq
# - NVIDIA NIM como fallback lento en normal-gratis

pseudo_models:
  # ── Razonamiento premium ──────────────────────────────────────────────────
  pensamiento-profundo-caro:
    display_name: Pensamiento Profundo
    description: "Razonamiento de máximo nivel. Límite 261K tokens — si lo superas usa /compact para continuar."
    input_token_threshold: 261144
    context_window: 261144
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: openai/kimi-k2.5
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        pdf: false
        context_window: 262144
        note: "Go: Kimi K2.5 vía OpenAI /chat/completions. Cache prefix reportado. Razonamiento vía servidor (~9.250 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-pro
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        pdf: false
        context_window: 1000000
        reasoning_effort: false
        strip_reasoning: true
        note: "Fallback: DeepSeek V4 Pro directo. Razonamiento max."
    fallback_strategy: sequential

  # ── Desarrollo sostenido ──────────────────────────────────────────────────
  tareas-avanzadas:
    display_name: Tareas Avanzadas
    description: "Desarrollo profundo y sostenido. MiniMax M2.7 vía Go."
    input_token_threshold: 195608
    context_window: 195608
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: openai/minimax-m2.7
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        pdf: false
        context_window: 196608
        note: "Go: MiniMax M2.7 (192K contexto) vía OpenAI /chat/completions. Cache prefix reportado (~17.000 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        pdf: false
        context_window: 1000000
        reasoning_effort: false
        strip_reasoning: true
        note: "Fallback: DeepSeek V4 Flash. Razonamiento max."
    fallback_strategy: sequential

  # ── Normal (punto de entrada) ─────────────────────────────────────────────
  normal:
    display_name: Normal
    description: "Punto de entrada recomendado. MiMo-V2.5 vía Go. Coding extenso."
    input_token_threshold: 999000
    context_window: 999000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: openai/mimo-v2.5
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: true
        pdf: false
        documents: false
        max_direct_image_size_kb: 512
        context_window: 1000000
        thinking: false
        reasoning_effort: false
        note: "Go: MiMo-V2.5 vía OpenAI /chat/completions (~150.400 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        pdf: false
        context_window: 1000000
        reasoning_effort: false
        note: "Fallback: DeepSeek V4 Flash. Razonamiento high."
    fallback_strategy: sequential

  # ── Visión ────────────────────────────────────────────────────────────────
  vision:
    display_name: Visión
    description: "Visión unificada: OCR, diagramas, UI, screenshots. Límite 130K tokens — usa /compact si superas."
    input_token_threshold: 130072
    context_window: 130072
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: groq
        model: groq/meta-llama/llama-4-scout-17b-16e-instruct
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: true
        context_window: 131072
        strip_reasoning: true
        reasoning_effort: false
        system_prompt: |
          Reasoning: medium

          Use available tools to complete tasks. Call tools directly instead of describing them. If a tool fails, retry once. Do not simulate tool outputs. Keep responses concise and action-oriented.
        note: "Primary: Visión vía Groq. 131K contexto. Rápido y barato."
      - provider: opencode-go
        model: openai/mimo-v2-omni
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: true
        context_window: 262144
        thinking: false
        reasoning_effort: false
        note: "Fallback: MiMo V2 Omni (256K contexto). Visión nativa + texto."
    fallback_strategy: sequential

  # ── Gratuito (sin Go) ─────────────────────────────────────────────────────
  normal-gratis:
    display_name: Normal Gratis
    description: "Modelos gratuitos y de bajo costo. Límite 999K tokens — usa /compact si lo superas."
    input_token_threshold: 999000
    context_window: 999000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: openrouter
        model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        pdf: false
        context_window: 1000000
        note: "Primary: Nemotron 3 Super 120B gratis vía OpenRouter. 1M ctx."
      - provider: nvidia
        model: openai/nvidia/nemotron-3-super-120b-a12b
        api_base: https://integrate.api.nvidia.com/v1
        api_key_env: NVIDIA_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        pdf: false
        context_window: 1000000
        note: "Fallback 2: NVIDIA NIM directo. Lento (~13.2s avg), ~40 RPM. Solo texto."
    fallback_strategy: sequential

  # ── Flash ────────────────────────────────────────────────────────────────
  flash:
    display_name: Flash
    description: "Sub-agentes rápidos. Clasificación, extracción, parsing. GPT-OSS 120B (Groq) + fallback Go Flash."
    input_token_threshold: 127000
    context_window: 127000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: groq
        model: groq/openai/gpt-oss-120b
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        pdf: false
        context_window: 128000
        temperature: 0.1
        top_p: 0.9
        reasoning_effort: false
        strip_reasoning: true
        system_prompt: |
          Reasoning: medium

          Use available tools to complete tasks. Call tools directly instead of describing them. If a tool fails, retry once. Do not simulate tool outputs. Keep responses concise and action-oriented.
        note: "Primary: GPT-OSS 120B vía Groq. Más capaz que 20B."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        pdf: false
        context_window: 1000000
        reasoning_effort: false
        strip_reasoning: true
        note: "Fallback: DeepSeek V4 Flash directo. Rápido, 1M contexto."
    fallback_strategy: sequential

  # ── Compactador (con helpers internos) ────────────────────────────────────
  compactador:
    display_name: Compactador
    description: "Compactación de contexto con delegación de modelos. Puede procesar hasta 3M tokens dividiendo en pedazos según el modelo disponible."
    input_token_threshold: 3000000
    context_window: 3000000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: groq
        model: groq/qwen/qwen3-32b
        context_window: 131072
        vision: false
        strip_reasoning: true
        system_prompt: |
          Reasoning: auto

          You are a context compaction specialist.

          Guidelines:
          * Preserve all essential facts, data, and relationships
          * Remove redundancy and filler content
          * Keep the original meaning and intent intact
          * Maintain chronological and logical order
          * Output in the same language as the input
          * Prioritize actionable information over meta-commentary
          * Be thorough—do not omit critical details
          * Complete the compaction in a single pass
        note: "Primary: Qwen3 32B vía Groq ($0.29/$0.59 por 1M). Barato y rápido."
      - provider: groq
        model: groq/openai/gpt-oss-120b
        context_window: 131072
        vision: false
        strip_reasoning: true
        system_prompt: |
          Reasoning: auto

          You are a context compaction specialist.

          Guidelines:
          * Preserve all essential facts, data, and relationships
          * Remove redundancy and filler content
          * Keep the original meaning and intent intact
          * Maintain chronological and logical order
          * Output in the same language as the input
          * Prioritize actionable information over meta-commentary
          * Be thorough—do not omit critical details
          * Complete the compaction in a single pass
        note: "Fallback 1: GPT-OSS 120B vía Groq ($0.15/$0.60). Más capaz."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        context_window: 1000000
        openai_tools_compatible: true
        reasoning_effort: false
        strip_reasoning: true
        vision: false
        note: "Fallback 2: DeepSeek V4 Flash. 1M contexto para historias grandes."
      # Modelos helper (no participan en fallback de chat)
      - provider: groq
        model: groq/whisper-large-v3
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        audio: true
        context_window: 131072
        note: "Whisper Large V3 — transcripción de audio (helper interno)."
      - provider: groq
        model: groq/whisper-large-v3-turbo
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        audio: true
        context_window: 131072
        note: "Whisper Large V3 Turbo — transcripción de audio rápida (helper interno)."
    fallback_strategy: by_context_window

model_aliases:
  gpt-4o: normal
  gpt-4o-mini: normal
  gpt-4.1: tareas-avanzadas
  o3: pensamiento-profundo-caro
  o4-mini: normal
  gemini-2.5-flash: vision
  gemini-2.5-pro: tareas-avanzadas
  claude-sonnet-4-20250514: tareas-avanzadas
  claude-haiku-3-5-20241022: flash
  gpt-oss: flash
  default: flash
