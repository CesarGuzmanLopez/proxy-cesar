pseudo_models:
  pensamiento-profundo-caro:
    display_name: Pensamiento Profundo
    description: "Razonamiento de máximo nivel. Límite 120K tokens — si lo superas usa compactalo para continuar."
    input_token_threshold: 120000
    context_window: 120000
    router_llm:
      enabled: true
      suggester: flash-lowcost
      suggest_on_downgrade_only: true
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: deepseek
        model: deepseek/deepseek-v4-pro
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Razonamiento profundo. 1M contexto, tools estrictas."
    fallback_strategy: sequential

  tareas-avanzadas:
    display_name: Tareas Avanzadas
    description: "Desarrollo profundo y sostenido. Límite 200K tokens — usa compactalo si lo superas."
    input_token_threshold: 200000
    context_window: 200000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: block
    physical_models:
      - provider: deepseek
        model: deepseek/deepseek-v4-pro
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 1000000
    fallback_strategy: sequential

  vision:
    display_name: Visión
    description: "Visión unificada: OCR, diagramas, UI, screenshots. Límite 120K tokens — usa compactalo si superas."
    input_token_threshold: 120000
    context_window: 120000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: groq
        model: groq/meta-llama/llama-4-scout-17b-16e-instruct
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: true
        context_window: 131072
        note: "Visión vía Groq. 131K contexto."
    fallback_strategy: sequential

  normal:
    display_name: Normal
    description: "Punto de entrada recomendado. Coding extenso. Límite 500K tokens — usa /compact si lo superas."
    input_token_threshold: 500000
    context_window: 500000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: block
    physical_models:
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Rápido, 1M contexto, tools estrictas."
    fallback_strategy: sequential

  normal-gratis:
    display_name: Normal Gratis
    description: "Modelos gratuitos y de bajo costo. Límite 200K tokens — usa /compact si lo superas."
    input_token_threshold: 200000
    context_window: 200000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: openrouter
        model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        note: "Gratuito vía OpenRouter. 1M contexto. Primary."
        context_window: 1000000
      - provider: groq
        model: groq/qwen/qwen3-32b
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        note: "Fallback rápido vía Groq. 32B, 131K contexto. Bajo costo."
        context_window: 131072
    fallback_strategy: sequential

  massive-fast:
    display_name: Massive Fast
    description: "Texto masivo ultrarrápido vía Groq. Límite 131K tokens. GPT-OSS 20B + Qwen 32B."
    input_token_threshold: 131072
    context_window: 131072
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: block
    physical_models:
      - provider: groq
        context_window: 131072
        model: groq/openai/gpt-oss-20b
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        note: "Razonamiento + velocidad Groq. 20B, 131K contexto, tools regulares."
    fallback_strategy: sequential

  flash-lowcost:
    display_name: Flash Lowcost
    description: "Sub-agentes baratos. Clasificación, extracción, parsing. Límite 128K."
    input_token_threshold: 128000
    context_window: 128000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: block
    physical_models:
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Barato vía DeepSeek. $0.14/$0.28 por M tok."
    fallback_strategy: sequential

  compactador:
    display_name: Compactador
    description: "Compactación de contexto con delegación de modelos. Escanea la conversación y usa los modelos adecuados: visión para imágenes, tools para function calls. Groq rápido (131K), DeepSeek Flash (1M) para historias masivas."
    input_token_threshold: 20000000
    context_window: 20000000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: groq
        model: groq/openai/gpt-oss-20b
        context_window: 131072
        openai_tools_compatible: true
        vision: false
        note: "Primary: 20B vía Groq (1000+ t/s). Texto puro para <131K."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        context_window: 1000000
        openai_tools_compatible: true
        vision: false
        note: "1M contexto. Para compactar historias grandes (>131K tokens)."
      # Whisper models for audio transcription (used by blob vault, not user-facing)
      - provider: groq
        model: groq/whisper-large-v3
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        audio: true
        context_window: 131072
        note: "Whisper Large V3 — transcripción de audio."
      - provider: groq
        model: groq/whisper-large-v3-turbo
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        audio: true
        context_window: 131072
        note: "Whisper Large V3 Turbo — transcripción de audio rápida."
    fallback_strategy: by_context_window

model_aliases:
  gpt-4o: normal
  gpt-4o-mini: normal
  gpt-4.1: tareas-avanzadas
  o3: pensamiento-profundo-caro
  o4-mini: pensamiento-profundo-caro
  gemini-2.5-flash: vision
  claude-haiku-3-5-20241022: flash-lowcost
  default: normal
