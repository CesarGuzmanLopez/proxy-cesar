# pseudo_models.yaml — Proxy pseudo-model configuration
#
# context_window e input_token_threshold de cada pseudo-modelo reflejan
# el mínimo de los context_window de sus physical models, con excepcion
# del modelo "compactador" que puede procesar hasta 3M tokens dividiendo
# en pedazos segun el modelo disponible.

pseudo_models:
  # ── Razonamiento premium ──────────────────────────────────────────────────
  pensamiento-profundo-caro:
    display_name: Pensamiento Profundo
    description: "Razonamiento de máximo nivel. Límite 1M tokens — si lo superas usa /compact para continuar."
    input_token_threshold: 1000000
    context_window: 1000000
    router_llm:
      enabled: true
      suggester: pensamiento-rapido
      suggest_on_downgrade_only: true
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: anthropic/qwen3.7-max
        api_base: https://opencode.ai/zen/go
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Go primary: Qwen3.7 Max vía Anthropic /messages. Premium reasoning (~4.770 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-pro
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Fallback: DeepSeek V4 Pro directo. Razonamiento profundo."
    fallback_strategy: sequential

  # ── Razonamiento ligero ────────────────────────────────────────────────────
  pensamiento-rapido:
    display_name: Pensamiento Rápido
    description: "Razonamiento ligero. Debug, code review, análisis rápidos. Límite 1M tokens — usa /compact si lo superas."
    input_token_threshold: 1000000
    context_window: 1000000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: anthropic/qwen3.6-plus
        api_base: https://opencode.ai/zen/go
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Go primary: Qwen3.6 Plus (Anthropic endpoint). Razonamiento ligero (~16.300 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Fallback: DeepSeek V4 Flash directo."
    fallback_strategy: sequential

  # ── Desarrollo sostenido ──────────────────────────────────────────────────
  tareas-avanzadas:
    display_name: Tareas Avanzadas
    description: "Desarrollo profundo y sostenido. Límite 262K tokens — usa /compact si lo superas."
    input_token_threshold: 262144
    context_window: 262144
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: openai/kimi-k2.6
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 262144
        note: "Go primary: Kimi K2.6 (256K contexto). Coding avanzado (~5.750 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-pro
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Fallback 1: DeepSeek V4 Pro directo."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Fallback 2: DeepSeek V4 Flash directo."
    fallback_strategy: sequential

  # ── Código preciso ────────────────────────────────────────────────
  codigo-preciso:
    display_name: Código Preciso
    description: "Generación de código puro. Refactors, tests, parches. Límite 1M tokens — usa /compact si lo superas."
    input_token_threshold: 1000000
    context_window: 1000000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: openai/mimo-v2.5-pro
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1048576
        note: "Go primary: MiMo V2.5 Pro (1M contexto). Especializado en código (~6.450 req/mes)."
      - provider: opencode-go
        model: openai/mimo-v2-pro
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1048576
        note: "Go fallback: MiMo V2 Pro (1M contexto)."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Fallback: DeepSeek V4 Flash directo."
    fallback_strategy: sequential

  # ── Visión ────────────────────────────────────────────────────────────────
  vision:
    display_name: Visión
    description: "Visión unificada: OCR, diagramas, UI, screenshots. Límite 131K tokens — usa /compact si superas."
    input_token_threshold: 131072
    context_window: 131072
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: groq
        model: groq/meta-llama/llama-4-scout-17b-16e-instruct
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: true
        context_window: 131072
        note: "Primary: Visión vía Groq. 131K contexto. Rápido y barato."
      - provider: opencode-go
        model: openai/mimo-v2-omni
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: true
        context_window: 262144
        note: "Fallback: MiMo V2 Omni (256K contexto). Visión nativa + texto."
    fallback_strategy: sequential

  # ── Normal (punto de entrada) ─────────────────────────────────────────────
  normal:
    display_name: Normal
    description: "Punto de entrada recomendado. Coding extenso. Límite 262K tokens — usa /compact si lo superas."
    input_token_threshold: 262144
    context_window: 262144
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: openai/kimi-k2.5
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 262144
        note: "Go primary: Kimi K2.5 (256K contexto). Rápido, tools estrictas (~9.250 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: true
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Fallback: DeepSeek V4 Flash. Rápido, 1M contexto."
    fallback_strategy: sequential

  # ── Gratuito (sin Go) ─────────────────────────────────────────────────────
  normal-gratis:
    display_name: Normal Gratis
    description: "Modelos gratuitos y de bajo costo. Límite 131K tokens — usa /compact si lo superas."
    input_token_threshold: 131072
    context_window: 131072
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: openrouter
        model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        note: "Gratuito vía OpenRouter. 1M contexto. Primary."
        context_window: 1000000
      - provider: groq
        model: groq/qwen/qwen3-32b
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        note: "Fallback rápido vía Groq. 32B, 131K contexto. Bajo costo."
        context_window: 131072
    fallback_strategy: sequential

  # ── Masivo rápido ─────────────────────────────────────────────────────────
  massive-fast:
    display_name: Massive Fast
    description: "Texto masivo ultrarrápido. Límite 131K tokens. MiniMax Go + GPT-OSS Groq."
    input_token_threshold: 131072
    context_window: 131072
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: anthropic/minimax-m2.7
        api_base: https://opencode.ai/zen/go
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 196608
        note: "Go primary: MiniMax M2.7 (192K, Anthropic endpoint). Velocidad extrema (~17.000 req/mes)."
      - provider: groq
        model: groq/openai/gpt-oss-20b
        context_window: 131072
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        note: "Fallback: GPT-OSS 20B vía Groq (1000+ t/s)."
    fallback_strategy: sequential

  # ── Flash Lowcost ──────────────────────────────────────────────────
  flash-lowcost:
    display_name: Flash Lowcost
    description: "Sub-agentes baratos. Clasificación, extracción, parsing. Límite 1M tokens."
    input_token_threshold: 1000000
    context_window: 1000000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: anthropic/qwen3.5-plus
        api_base: https://opencode.ai/zen/go
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Go primary: Qwen3.5 Plus (Anthropic endpoint). El más barato de Go (~50.500 req/mes)."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 1000000
        note: "Fallback: DeepSeek V4 Flash directo."
    fallback_strategy: sequential

  # ── Compactador (con helpers internos) ────────────────────────────────────
  compactador:
    display_name: Compactador
    description: "Compactación de contexto con delegación de modelos. Puede procesar hasta 3M tokens dividiendo en pedazos según el modelo disponible."
    input_token_threshold: 3000000
    context_window: 3000000
    router_llm:
      enabled: false
    image_handling:
      on_downgrade: auto_describe
    physical_models:
      - provider: opencode-go
        model: openai/glm-5.1
        api_base: https://opencode.ai/zen/go/v1
        api_key_env: OPENCODE_API_KEY
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: true
        vision: false
        context_window: 198000
        note: "Go primary: GLM-5.1 (198K contexto). Compactación vía Go (~4.300 req/mes)."
      - provider: groq
        model: groq/openai/gpt-oss-20b
        context_window: 131072
        openai_tools_compatible: true
        vision: false
        note: "Fallback 1: 20B vía Groq (1000+ t/s). Texto puro para <131K."
      - provider: deepseek
        model: deepseek/deepseek-v4-flash
        context_window: 1000000
        openai_tools_compatible: true
        vision: false
        note: "Fallback 2: 1M contexto. Para historias grandes (>131K tokens)."
      # Modelos helper (no participan en fallback de chat)
      - provider: groq
        model: groq/whisper-large-v3
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        audio: true
        context_window: 131072
        note: "Whisper Large V3 — transcripción de audio (helper interno)."
      - provider: groq
        model: groq/whisper-large-v3-turbo
        openai_tools_compatible: true
        tools_strict: false
        parallel_tools: false
        vision: false
        audio: true
        context_window: 131072
        note: "Whisper Large V3 Turbo — transcripción de audio rápida (helper interno)."
    fallback_strategy: by_context_window

model_aliases:
  gpt-4o: normal
  gpt-4o-mini: normal
  gpt-4.1: tareas-avanzadas
  o3: pensamiento-profundo-caro
  o4-mini: pensamiento-rapido
  gemini-2.5-flash: vision
  gemini-2.5-pro: codigo-preciso
  claude-sonnet-4-20250514: codigo-preciso
  claude-haiku-3-5-20241022: flash-lowcost
  default: normal
