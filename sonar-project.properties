# SonarQube project configuration for proxy-cesar
sonar.projectKey=proxy-cesar
sonar.projectName=proxy-cesar
sonar.projectVersion=0.1.0

# Path to the main source directory (relative to sonar-project.properties)
sonar.sources=proxy/src
sonar.tests=proxy/tests

# Python language settings
sonar.language=py
sonar.python.version=3.12

# Test reports and coverage
sonar.python.coverage.reportPaths=proxy/coverage.xml

# Exclude migrations and build artifacts from analysis
sonar.exclusions=**/migrations/**,**/build/**,**/__pycache__/**,**/*.pyc

# Test exclusions (don't analyze test files as production code)
sonar.test.exclusions=**/tests/**,**/conftest.py

# Encoding
sonar.sourceEncoding=UTF-8

# SonarQube server URL
sonar.host.url=http://localhost:9000

# Authentication token (set via env variable SONAR_TOKEN or -Dsonar.token)
