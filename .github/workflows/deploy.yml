# .github/workflows/deploy.yml — Deploy proxy-cesar to plata on push to main
#
# Requires the following secrets in the repository:
#   PLATA_HOST       — IP or hostname of the target server
#   PLATA_SSH_PORT   — SSH port (default 22)
#   PLATA_USER       — deploy user on the server (must have sudo for systemctl)
#   PLATA_SSH_KEY    — private SSH key for the deploy user
#   PROXY_API_KEY    — Bearer token for API access
#   DEEPSEEK_API_KEY
#   GROQ_API_KEY
#   OPENROUTER_API_KEY
#   OPENCODE_API_KEY  — OpenCode Go API key
#   PRUNA_API_KEY

name: Deploy to plata

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.repository == 'CesarGuzmanLopez/proxy-cesar'

    env:
      PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      PRUNA_API_KEY: ${{ secrets.PRUNA_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PLATA_HOST }}
          port: ${{ secrets.PLATA_SSH_PORT || '22' }}
          username: ${{ secrets.PLATA_USER }}
          key: ${{ secrets.PLATA_SSH_KEY }}
          envs: >-
            PROXY_API_KEY,DEEPSEEK_API_KEY,GROQ_API_KEY,
            OPENROUTER_API_KEY,OPENCODE_API_KEY,PRUNA_API_KEY
          script: |
            set -euo pipefail

            VENV_DIR="/tmp/proxy-cesar-venv"
            REPO_DIR="/tmp/proxy-cesar"
            BRANCH="main"

            echo "=== proxy-cesar deploy ==="

            # ── 1. Clean clone to /tmp (always fresh, always writable) ─
            echo "[deploy] Cloning fresh repository..."
            rm -rf "$REPO_DIR"
            git clone --branch "$BRANCH" --depth 1 \
              https://github.com/CesarGuzmanLopez/proxy-cesar.git "$REPO_DIR"
            cd "$REPO_DIR/proxy"

            # ── 2. Python virtual environment (cached in /tmp) ────
            if [ ! -d "$VENV_DIR" ]; then
              echo "[deploy] Creating virtual environment..."
              python3.14 -m venv "$VENV_DIR"
            fi
            source "$VENV_DIR/bin/activate"

            echo "[deploy] Installing/updating dependencies..."
            pip install --quiet --upgrade pip setuptools wheel
            pip install --quiet --no-cache-dir ".[dev]"

            # ── 3. Write .env ─────────────────────────────────────
            echo "[deploy] Writing .env..."
            cat > .env <<-EOF
            PROXY_PORT=9110
            PROXY_API_KEY=${PROXY_API_KEY}
            DATABASE_URL=sqlite+aiosqlite:///./proxy.db
            VALKEY_URL=valkey://localhost:6379
            DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
            GROQ_API_KEY=${GROQ_API_KEY}
            OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
            OPENCODE_API_KEY=${OPENCODE_API_KEY}
            PRUNA_API_KEY=${PRUNA_API_KEY}
            EOF

            chmod 600 .env

            # ── 4. Systemd service ────────────────────────────────
            SERVICE_FILE="/etc/systemd/system/proxy-cesar.service"

            echo "[deploy] Writing systemd service..."
            sudo tee "$SERVICE_FILE" > /dev/null <<-SERVICEEOF
            [Unit]
            Description=Proxy Cesar — Deterministic Multi-Model LLM Proxy
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            User=${USER}
            WorkingDirectory=${REPO_DIR}/proxy
            ExecStart=${VENV_DIR}/bin/python -m src.main
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            sudo systemctl daemon-reload
            sudo systemctl enable proxy-cesar
            echo "[deploy] Service updated"

            # ── 5. Restart service ────────────────────────────────
            echo "[deploy] Restarting service..."
            sudo systemctl restart proxy-cesar
            echo "[deploy] Done — $(sudo systemctl is-active proxy-cesar)"
