# .github/workflows/deploy.yml — Deploy proxy-cesar to plata on push to main
#
# Requires the following secrets in the repository:
#   PLATA_HOST       — IP or hostname of the target server
#   PLATA_SSH_PORT   — SSH port (default 22)
#   PLATA_USER       — deploy user on the server (must have sudo for systemctl)
#   PLATA_SSH_KEY    — private SSH key for the deploy user
#   PROXY_API_KEY    — Bearer token for API access
#   ANTHROPIC_API_KEY
#   DEEPSEEK_API_KEY
#   GOOGLE_API_KEY
#   GROQ_API_KEY
#   OPENROUTER_API_KEY
#   ZHIPUAI_API_KEY
#   ZAI_API_KEY
#   OPENCODE_API_KEY  — OpenCode Go API key
#   PRUNA_API_KEY

name: Deploy to plata

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.repository == 'CesarGuzmanLopez/proxy-cesar'

    env:
      PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      PRUNA_API_KEY: ${{ secrets.PRUNA_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PLATA_HOST }}
          port: ${{ secrets.PLATA_SSH_PORT || '22' }}
          username: ${{ secrets.PLATA_USER }}
          key: ${{ secrets.PLATA_SSH_KEY }}
          envs: >-
            PROXY_API_KEY,ANTHROPIC_API_KEY,DEEPSEEK_API_KEY,GOOGLE_API_KEY,GROQ_API_KEY,
            OPENROUTER_API_KEY,ZHIPUAI_API_KEY,ZAI_API_KEY,
            OPENCODE_API_KEY,PRUNA_API_KEY
          script: |
            set -euo pipefail

            REPO_DIR="/opt/proxy-cesar"
            BRANCH="main"

            echo "=== proxy-cesar deploy ==="

            # ── 1. Clone or pull ──────────────────────────────────
            if [ ! -d "$REPO_DIR" ]; then
              echo "[deploy] First run — cloning repository..."
              git clone --branch "$BRANCH" --depth 1 \
                https://github.com/CesarGuzmanLopez/proxy-cesar.git "$REPO_DIR"
            else
              echo "[deploy] Pulling latest changes..."
              cd "$REPO_DIR"
              git fetch origin "$BRANCH" --depth 1
              git reset --hard "origin/$BRANCH"
            fi

            cd "$REPO_DIR/proxy"

            # ── 2. Python virtual environment ─────────────────────
            if [ ! -d ".venv" ]; then
              echo "[deploy] Creating virtual environment..."
              python3.14 -m venv .venv
            fi

            source .venv/bin/activate

            echo "[deploy] Installing/updating dependencies..."
            pip install --quiet --upgrade pip setuptools wheel
            pip install --quiet --no-cache-dir ".[dev]"

            # ── 3. Write .env ─────────────────────────────────────
            echo "[deploy] Writing .env..."
            cat > .env <<-EOF
            PROXY_PORT=9110
            DATABASE_URL=sqlite+aiosqlite:///./proxy.db
            VALKEY_URL=valkey://localhost:6379
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
            GOOGLE_API_KEY=${GOOGLE_API_KEY}
            GROQ_API_KEY=${GROQ_API_KEY}
            OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
            ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}
            ZAI_API_KEY=${ZAI_API_KEY}
            OPENCODE_API_KEY=${OPENCODE_API_KEY}
            PRUNA_API_KEY=${PRUNA_API_KEY}
            EOF

            chmod 600 .env

            # ── 4. Systemd service ────────────────────────────────
            SERVICE_FILE="/etc/systemd/system/proxy-cesar.service"

            if [ ! -f "$SERVICE_FILE" ]; then
              echo "[deploy] Creating systemd service..."
              sudo tee "$SERVICE_FILE" > /dev/null <<-SERVICEEOF
            [Unit]
            Description=Proxy Cesar — Deterministic Multi-Model LLM Proxy
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            User=proxy
            WorkingDirectory=${REPO_DIR}/proxy
            ExecStart=${REPO_DIR}/proxy/.venv/bin/python -m src.main
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

              sudo systemctl daemon-reload
              sudo systemctl enable proxy-cesar
              echo "[deploy] Service created and enabled"
            fi

            # ── 5. Restart service ────────────────────────────────
            echo "[deploy] Restarting service..."
            sudo systemctl restart proxy-cesar
            echo "[deploy] Done — $(sudo systemctl is-active proxy-cesar)"
