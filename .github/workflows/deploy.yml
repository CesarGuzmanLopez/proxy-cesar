# .github/workflows/deploy.yml — Deploy proxy-cesar to plata on push to main
#
# Requires the following secrets in the repository:
#   PLATA_HOST       — IP or hostname of the target server
#   PLATA_SSH_PORT   — SSH port (default 22)
#   PLATA_USER       — deploy user on the server
#   PLATA_SSH_KEY    — private SSH key for the deploy user
#   ANTHROPIC_API_KEY
#   DEEPSEEK_API_KEY
#   GOOGLE_API_KEY
#   GROQ_API_KEY
#   OPENROUTER_API_KEY
#   ZHIPUAI_API_KEY
#   ZAI_API_KEY

name: Deploy to plata

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.repository == 'CesarGuzmanLopez/proxy-cesar'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PLATA_HOST }}
          port: ${{ secrets.PLATA_SSH_PORT || '22' }}
          username: ${{ secrets.PLATA_USER }}
          key: ${{ secrets.PLATA_SSH_KEY }}
          script: |
            # Pass all secrets as env vars to deploy.sh
            export PROXY_PORT=9110
            export REPO_DIR=/opt/proxy-cesar
            export GIT_REPO_URL=https://github.com/CesarGuzmanLopez/proxy-cesar.git
            export BRANCH=main
            export ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            export DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            export GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            export GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            export OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            export ZHIPUAI_API_KEY=${{ secrets.ZHIPUAI_API_KEY }}
            export ZAI_API_KEY=${{ secrets.ZAI_API_KEY }}
            bash /opt/proxy-cesar/scripts/deploy.sh
