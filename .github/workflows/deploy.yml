# .github/workflows/deploy.yml — Deploy proxy-cesar on push to main
#
# Requires the following secrets in the repository:
#   HOST             — IP or hostname of the target server
#   SSH_PORT         — SSH port (default 22)
#   SSH_USER         — deploy user on the server (must have sudo for systemctl)
#   SSH_KEY          — private SSH key for the deploy user
#   DATABASE_URL     — PostgreSQL connection string
#   PROXY_API_KEY    — Bearer token for API access
#   DEEPSEEK_API_KEY
#   GROQ_API_KEY
#   OPENROUTER_API_KEY
#   OPENCODE_API_KEY  — OpenCode Go API key
#   PRUNA_API_KEY
#   NVIDIA_API_KEY
#   VALKEY_URL        — Redis/Valkey URL (default: valkey://localhost:6380)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.repository == 'CesarGuzmanLopez/proxy-cesar'

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      PRUNA_API_KEY: ${{ secrets.PRUNA_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DISABLED_PROVIDERS: ${{ vars.DISABLED_PROVIDERS || '' }}
      VALKEY_URL: ${{ secrets.VALKEY_URL || 'valkey://localhost:6380' }}
      LOG_FILE: ${{ vars.LOG_FILE || '/var/log/proxy-cesar/proxy.log' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PLATA_HOST }}
          port: ${{ secrets.PLATA_SSH_PORT || '22' }}
          username: ${{ secrets.PLATA_USER }}
          key: ${{ secrets.PLATA_SSH_KEY }}
          envs: |
            DATABASE_URL
            PROXY_API_KEY
            DEEPSEEK_API_KEY
            DEEPSEEK_API_KEY_2
            GROQ_API_KEY
            OPENROUTER_API_KEY
            OPENCODE_API_KEY
            PRUNA_API_KEY
            NVIDIA_API_KEY
            DISABLED_PROVIDERS
            VALKEY_URL
            LOG_FILE
          script: |
            set -euo pipefail

            VENV_DIR="/tmp/proxy-cesar-venv"
            REPO_DIR="/tmp/proxy-cesar"
            BRANCH="main"
            PROXY_USER="proxy"

            echo "=== proxy-cesar deploy ==="
            echo "[deploy] Target: ${REPO_DIR}"

            # ── 1. Git pull (incremental, preserves .env) ───────────
            echo "[deploy] Updating repository..."
            if [ -d "$REPO_DIR/.git" ]; then
              cd "$REPO_DIR"
              git fetch origin "$BRANCH" --depth 1 2>&1
              git reset --hard "origin/$BRANCH" 2>&1
            else
              sudo rm -rf "$REPO_DIR" 2>/dev/null || true
              git clone --branch "$BRANCH" --depth 1 \
                https://github.com/CesarGuzmanLopez/proxy-cesar.git "$REPO_DIR"
            fi

            if [ ! -f "${REPO_DIR}/proxy/src/main.py" ]; then
              echo "[deploy] FATAL: Missing src/main.py after update"
              ls -la "$REPO_DIR" 2>/dev/null || echo "(dir missing)"
              exit 1
            fi
            echo "[deploy] Repo OK"

            # ── 3. Fix ownership ──────────────────────────────────
            echo "[deploy] Fixing permissions for user ${PROXY_USER}..."
            sudo chown -R "${PROXY_USER}:${PROXY_USER}" "$REPO_DIR"
            sudo chmod 755 "$REPO_DIR" "$REPO_DIR/proxy"

            cd "$REPO_DIR/proxy"

            # ── 4. Python virtual environment (cached in /tmp) ────
            if [ ! -d "$VENV_DIR" ]; then
              echo "[deploy] Creating virtual environment..."
              python3.14 -m venv "$VENV_DIR"
            fi
            source "$VENV_DIR/bin/activate"

            echo "[deploy] Installing/updating dependencies..."
            pip install --quiet --upgrade pip setuptools wheel
            pip install --quiet --no-cache-dir ".[dev]"

            # ── 4.5. Clean Python cache to force recompilation ──────
            echo "[deploy] Clearing Python bytecode cache..."
            find "$REPO_DIR" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            find "$REPO_DIR" -type f -name "*.pyc" -delete 2>/dev/null || true

            # ── 5. Write .env with secrets ──────────────────────────
            # GitHub evaluates ${{ secrets.X }} before sending the script to SSH,
            # so the actual secret values get embedded directly in the heredoc.
            echo "[deploy] Writing .env..."
            sudo tee .env > /dev/null <<-ENVEOF
            PROXY_HOST=0.0.0.0
            PROXY_PORT=9110
            PROXY_API_KEY=${{ secrets.PROXY_API_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            VALKEY_URL=${{ secrets.VALKEY_URL || 'valkey://localhost:6380' }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_API_KEY_2=${{ secrets.DEEPSEEK_API_KEY_2 }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            OPENCODE_API_KEY=${{ secrets.OPENCODE_API_KEY }}
            PRUNA_API_KEY=${{ secrets.PRUNA_API_KEY }}
            NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
            DISABLED_PROVIDERS=${{ vars.DISABLED_PROVIDERS || '' }}
            LOG_FILE=${{ vars.LOG_FILE || '/var/log/proxy-cesar/proxy.log' }}
            ENVEOF

            sudo chmod 600 .env
            sudo chown "${PROXY_USER}:${PROXY_USER}" .env

            # ── 6. Systemd service (always runs as proxy) ─────────
            SERVICE_FILE="/etc/systemd/system/proxy-cesar.service"

            echo "[deploy] Writing systemd service..."
            sudo tee "$SERVICE_FILE" > /dev/null <<-SERVICEEOF
            [Unit]
            Description=Proxy Cesar — Deterministic Multi-Model LLM Proxy
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            User=${PROXY_USER}
            WorkingDirectory=${REPO_DIR}/proxy
            ExecStart=${VENV_DIR}/bin/python -m src.main
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            sudo systemctl daemon-reload
            sudo systemctl enable proxy-cesar
            echo "[deploy] Service updated"

            # ── 7. Restart service ────────────────────────────────
            echo "[deploy] Restarting service..."
            sudo systemctl restart proxy-cesar
            sleep 2
            SERVICE_STATUS=$(sudo systemctl is-active proxy-cesar)
            echo "[deploy] Service status: ${SERVICE_STATUS}"

            # ── 8. Health check with retries ──────────────────────
            echo "[deploy] Running health check..."
            HEALTH=""
            for i in 1 2 3 4 5; do
              sleep 3
              HEALTH=$(curl -s http://127.0.0.1:9110/health 2>/dev/null || echo "")
              if [ -n "$HEALTH" ]; then
                echo "[deploy] Health: ${HEALTH}"
                break
              fi
              echo "[deploy] Health check attempt $i/5 — not ready yet"
            done
            if [ -z "$HEALTH" ]; then
              echo "[deploy] WARNING: Health check failed after 5 retries"
            fi
            echo "[deploy] Done"
